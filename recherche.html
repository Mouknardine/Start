<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plombier à Lausanne — Résultats | Artisano</title>
<meta name="description" content="Comparez les meilleurs artisans plombiers à Lausanne. Avis vérifiés, tarifs transparents, prise de rendez-vous en ligne.">
<meta name="theme-color" content="#E8700A">
<link rel="canonical" href="https://artisano.ch/recherche">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23E8700A'/></svg>">
<meta property="og:type" content="website">
<meta property="og:title" content="Plombier à Lausanne — Résultats | Artisano">
<meta property="og:description" content="Comparez les meilleurs artisans plombiers à Lausanne.">
<meta property="og:url" content="https://artisano.ch/recherche">
<meta property="og:site_name" content="Artisano">
<meta property="og:locale" content="fr_CH">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="artisano-common.css">
<style>
  :root {
    --dark-light: #2B3D68;
    --radius-xs: 6px;
  }

  /* ===== NAV ===== */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 14px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(250,250,248,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(0,0,0,0.05);
  }

  .logo {
    font-family: 'Sora', sans-serif;
    font-weight: 800;
    font-size: 24px;
    color: var(--dark);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .logo-dot {
    width: 8px; height: 8px;
    background: var(--orange);
    border-radius: 50%;
  }

  /* NAV SEARCH */
  .nav-search {
    flex: 1;
    max-width: 560px;
    margin: 0 32px;
    display: flex;
    align-items: center;
    background: white;
    border: 1px solid var(--gray-200);
    border-radius: 50px;
    padding: 4px 4px 4px 20px;
    transition: all 0.2s;
  }

  .nav-search:focus-within {
    border-color: var(--orange);
    box-shadow: 0 0 0 3px rgba(232,112,10,0.08);
  }

  .nav-search-field {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
  }

  .nav-search-field svg {
    width: 16px; height: 16px;
    color: var(--gray-500);
    flex-shrink: 0;
  }

  .nav-search-field input {
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    background: transparent;
    color: var(--dark);
    width: 100%;
  }

  .nav-search-divider {
    width: 1px;
    height: 24px;
    background: var(--gray-200);
    margin: 0 12px;
    flex-shrink: 0;
  }

  .nav-search-btn {
    background: var(--orange);
    color: white;
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .nav-search-btn:hover {
    background: var(--orange-dark);
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
  }

  .btn-nav {
    background: var(--dark);
    color: white;
    padding: 9px 22px;
    border-radius: 50px;
    font-weight: 600;
    font-size: 14px;
    text-decoration: none;
    transition: all 0.3s;
  }

  .btn-nav:hover {
    background: var(--orange);
    transform: translateY(-1px);
  }

  /* ===== SEARCH HEADER ===== */
  .search-header {
    padding-top: 80px;
    background: white;
    border-bottom: 1px solid var(--gray-200);
  }

  .search-header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 40px;
  }

  .breadcrumb {
    font-size: 13px;
    color: var(--gray-500);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .breadcrumb a {
    color: var(--gray-500);
    text-decoration: none;
    transition: color 0.2s;
  }

  .breadcrumb a:hover { color: var(--orange); }

  .search-title-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 20px;
  }

  .search-title {
    font-family: 'Sora', sans-serif;
    font-size: 28px;
    font-weight: 800;
  }

  .search-title span {
    color: var(--orange);
  }

  .search-count {
    font-size: 15px;
    color: var(--gray-500);
  }

  /* FILTERS */
  .filters-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .filter-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 50px;
    border: 1px solid var(--gray-200);
    background: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--gray-700);
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }

  .filter-btn:hover {
    border-color: var(--gray-300);
    background: var(--gray-100);
  }

  .filter-btn.active {
    border-color: var(--orange);
    background: rgba(232,112,10,0.05);
    color: var(--orange);
    font-weight: 600;
  }

  .filter-btn svg {
    width: 16px; height: 16px;
  }

  .filter-urgence.active {
    border-color: #D32F2F;
    background: rgba(211,47,47,0.06);
    color: #D32F2F;
    font-weight: 600;
  }


  /* ===== RESULTS LAYOUT ===== */
  .results-layout {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 40px 80px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }

  /* SORT BAR */
  .sort-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .sort-bar-left {
    font-size: 14px;
    color: var(--gray-500);
  }

  .sort-bar-left strong {
    color: var(--dark);
  }

  .sort-select {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--gray-700);
  }

  .sort-select select {
    border: 1px solid var(--gray-200);
    border-radius: 8px;
    padding: 8px 32px 8px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--dark);
    background: white;
    appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%238A8680' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 10px center;
    cursor: pointer;
    outline: none;
  }

  /* ===== ARTISAN CARD ===== */
  .artisan-card {
    background: white;
    border-radius: var(--radius);
    border: 1px solid var(--gray-200);
    display: grid;
    grid-template-columns: 200px 1fr 240px;
    overflow: hidden;
    transition: all 0.3s;
    cursor: pointer;
    min-height: 240px;
  }

  .artisan-card:hover {
    border-color: var(--gray-300);
    box-shadow: 0 8px 32px rgba(0,0,0,0.06);
    transform: translateY(-2px);
  }

  /* Card image */
  .card-img {
    background: linear-gradient(135deg, var(--dark) 0%, var(--dark-mid) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .card-img svg {
    width: 48px; height: 48px;
    color: rgba(255,255,255,0.15);
  }

  .card-img-badge {
    position: absolute;
    bottom: 14px;
    left: 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .badge-available {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(8px);
    padding: 5px 12px;
    border-radius: 50px;
    font-size: 12px;
    font-weight: 700;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .badge-available::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
  }

  /* Card body */
  .card-body {
    padding: 22px 24px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 6px;
  }

  .card-name {
    font-family: 'Sora', sans-serif;
    font-size: 19px;
    font-weight: 700;
    line-height: 1.2;
  }

  .card-rating {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 2px;
  }

  .card-stars {
    color: #F0B429;
    font-size: 15px;
    letter-spacing: 1px;
  }

  .card-score {
    font-family: 'Sora', sans-serif;
    font-weight: 800;
    font-size: 15px;
    color: var(--dark);
  }

  .card-reviews {
    font-size: 13px;
    color: var(--gray-500);
  }

  .card-trade {
    color: var(--orange);
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .card-location {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--gray-700);
  }

  .card-location svg {
    width: 14px; height: 14px;
    color: var(--gray-500);
    flex-shrink: 0;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .card-tag {
    background: var(--gray-100);
    padding: 4px 12px;
    border-radius: 50px;
    font-size: 11px;
    color: var(--gray-700);
    font-weight: 500;
  }

  .card-description {
    font-size: 13px;
    color: var(--gray-500);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Card sidebar */
  .card-side {
    padding: 20px;
    border-left: 1px solid var(--gray-200);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 10px;
    width: 240px;
    background: rgba(242,241,238,0.5);
  }

  .card-avail {
    text-align: center;
  }

  .card-avail-label {
    font-size: 12px;
    color: var(--gray-500);
    margin-bottom: 4px;
  }

  .card-avail-value {
    font-family: 'Sora', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--green);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .card-avail-value svg {
    width: 16px; height: 16px;
  }

  .card-next-slots {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
  }

  .card-slot {
    background: var(--green-light);
    color: var(--green);
    padding: 5px 12px;
    border-radius: 50px;
    font-size: 12px;
    font-weight: 600;
  }

  .btn-voir-profil {
    background: var(--orange);
    color: white;
    padding: 12px 28px;
    border-radius: 50px;
    font-family: 'Sora', sans-serif;
    font-weight: 700;
    font-size: 14px;
    border: none;
    cursor: pointer;
    transition: all 0.3s;
    text-decoration: none;
    text-align: center;
    width: 100%;
  }

  .btn-voir-profil:hover {
    background: var(--orange-dark);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(232,112,10,0.25);
  }

  .btn-contacter {
    background: white;
    color: var(--dark);
    padding: 10px 28px;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 13px;
    border: 1px solid var(--gray-300);
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    text-align: center;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn-contacter:hover {
    border-color: var(--dark);
    background: var(--gray-100);
  }

  /* ===== URGENCE BADGE (card) ===== */
  .card-urgence-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, #D32F2F 0%, #B71C1C 100%);
    color: white;
    padding: 6px 14px;
    border-radius: 50px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2px;
    margin-top: 8px;
    width: fit-content;
  }

  .card-urgence-badge svg {
    width: 13px; height: 13px;
    flex-shrink: 0;
  }

  .card-urgence-badge .urgence-dot {
    width: 6px; height: 6px;
    background: #FF8A80;
    border-radius: 50%;
    animation: urgenceDot 1.5s ease-in-out infinite;
  }

  @keyframes urgenceDot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ===== PAGINATION ===== */
  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin-top: 32px;
  }

  .page-btn {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    border: 1px solid var(--gray-200);
    background: white;
    font-family: 'Sora', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: var(--gray-700);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .page-btn:hover {
    border-color: var(--gray-300);
    background: var(--gray-100);
  }

  .page-btn.active {
    background: var(--orange);
    color: white;
    border-color: var(--orange);
  }

  .page-btn.arrow {
    color: var(--gray-500);
  }

  .page-btn.arrow:hover {
    color: var(--dark);
  }

  /* ===== NO RESULTS INFO ===== */
  .results-info {
    background: var(--blue-light);
    border-radius: var(--radius);
    padding: 20px 24px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    margin-bottom: 8px;
  }

  .results-info svg {
    width: 20px; height: 20px;
    color: var(--blue);
    flex-shrink: 0;
    margin-top: 2px;
  }

  .results-info p {
    font-size: 14px;
    line-height: 1.6;
    color: var(--blue);
  }

  .results-info strong {
    font-weight: 700;
  }

  /* ===== HAMBURGER MENU ===== */
  .hamburger {
    display: none;
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px;
    color: var(--dark);
    -webkit-tap-highlight-color: transparent;
  }
  .nav-links {
    display: none;
    align-items: center;
    gap: 24px;
  }
  .nav-links a {
    color: var(--gray-700);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--dark); }

  /* ===== RESPONSIVE ===== */

  /* --- Tablet / narrow desktop (960px) --- */
  @media (max-width: 960px) {
    nav { padding: 12px 16px; }
    .nav-search { margin: 0 12px; }
    .search-header-inner { padding: 20px 16px; }
    .search-title { font-size: 22px; }
    .results-layout { padding: 16px 16px 80px; }

    .artisan-card {
      grid-template-columns: 1fr;
    }

    .card-img {
      min-height: 140px;
    }

    .card-side {
      border-left: none;
      border-top: 1px solid var(--gray-200);
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      padding: 16px;
      width: 100%;
    }

    .card-side .card-avail {
      width: 100%;
    }

    .card-side .btn-voir-profil,
    .card-side .btn-contacter {
      flex: 1;
    }

    .filters-row {
      overflow-x: auto;
      flex-wrap: nowrap;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }

    .filter-btn {
      flex-shrink: 0;
    }
  }

  /* --- Mobile (900px and below) --- */
  @media (max-width: 900px) {
    /* Nav */
    nav { padding: 12px 16px; }
    .nav-search { display: none; }
    .nav-right { display: none; }
    .hamburger { display: block; }
    .nav-links {
      display: none;
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      background: white;
      flex-direction: column;
      padding: 24px;
      gap: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      border-bottom: 1px solid #E5E3DE;
      z-index: 99;
    }
    .nav-links.open { display: flex; }
    .btn-nav { padding: 8px 18px; font-size: 13px; }

    /* Search header */
    .search-header-inner { padding: 16px; }
    .breadcrumb { font-size: 12px; margin-bottom: 12px; }
    .search-title { font-size: 22px; }
    .search-count { font-size: 13px; }

    .search-title-row {
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }

    /* Results layout */
    .results-layout {
      padding: 16px 16px 60px;
      gap: 16px;
    }

    /* Sort bar */
    .sort-bar {
      flex-direction: column;
      gap: 8px;
      align-items: stretch;
    }

    .sort-select {
      justify-content: flex-start;
    }

    .sort-select select {
      font-size: 16px; /* prevent iOS zoom */
    }

    /* Cards: single-column stacked */
    .artisan-card {
      grid-template-columns: 1fr;
      min-height: auto;
    }

    .card-img {
      min-height: 140px;
      width: 100%;
    }

    .card-body {
      padding: 16px;
    }

    .card-side {
      border-left: none;
      border-top: 1px solid var(--gray-200);
      flex-direction: column;
      width: 100%;
      padding: 16px;
      gap: 10px;
    }

    .card-side .card-avail {
      width: 100%;
    }

    .card-side .btn-voir-profil,
    .card-side .btn-contacter {
      width: 100%;
      text-align: center;
      padding: 12px;
    }

    .card-next-slots {
      justify-content: flex-start;
    }

    /* Filters: horizontal scroll */
    .filters-row {
      overflow-x: auto;
      flex-wrap: nowrap;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }

    .filter-btn {
      flex-shrink: 0;
      padding: 8px 14px;
      font-size: 13px;
    }

    /* Pagination */
    .pagination {
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
    }

    .page-btn {
      width: 36px;
      height: 36px;
      font-size: 13px;
    }

    /* Prevent iOS zoom on inputs */
    .nav-search-field input,
    .sort-select select,
    input,
    select,
    textarea {
      font-size: 16px;
    }

    /* Results info box */
    .results-info {
      padding: 16px;
      flex-direction: column;
      gap: 10px;
    }

    .results-info p {
      font-size: 13px;
    }
  }

  /* --- Small mobile (500px and below) --- */
  @media (max-width: 500px) {
    nav { padding: 10px 12px; }
    .logo { font-size: 20px; }
    .btn-nav { padding: 7px 14px; font-size: 12px; }

    .search-header-inner { padding: 12px; }
    .search-title { font-size: 19px; }
    .search-count { font-size: 12px; }
    .breadcrumb { font-size: 11px; gap: 4px; }

    .results-layout { padding: 12px 12px 48px; gap: 12px; }

    .card-body { padding: 12px; }
    .card-name { font-size: 16px; }
    .card-tags { gap: 4px; }
    .card-tag { font-size: 11px; padding: 4px 8px; }
    .card-rating { font-size: 13px; }
    .card-stars { font-size: 13px; }
    .card-score { font-size: 13px; }
    .card-reviews { font-size: 11px; }
    .card-trade { font-size: 11px; }
    .card-location { font-size: 12px; }
    .card-description { font-size: 12px; }

    .card-side { padding: 12px; gap: 8px; }
    .card-slot { font-size: 11px; padding: 4px 10px; }
    .card-avail-label { font-size: 11px; }
    .card-avail-value { font-size: 13px; }

    .btn-voir-profil { font-size: 13px; padding: 12px; min-height: 44px; }
    .btn-contacter { font-size: 13px; padding: 12px 16px; min-height: 44px; }

    .sort-bar-left { font-size: 12px; }
    .sort-select { font-size: 12px; min-height: 44px; }

    .pagination { gap: 6px; margin-top: 20px; }
    .page-btn { width: 44px; height: 44px; min-height: 44px; font-size: 14px; border-radius: 10px; }

    .filter-btn { padding: 10px 16px; min-height: 44px; font-size: 13px; }
    .filter-btn svg { width: 14px; height: 14px; }
    .btn-nav { padding: 10px 16px; min-height: 44px; }
  }

  /* ===== ANIMATION ===== */
  .artisan-card {
    animation: cardIn 0.4s ease-out both;
  }

  .artisan-card:nth-child(1) { animation-delay: 0.05s; }
  .artisan-card:nth-child(2) { animation-delay: 0.1s; }
  .artisan-card:nth-child(3) { animation-delay: 0.15s; }
  .artisan-card:nth-child(4) { animation-delay: 0.2s; }
  .artisan-card:nth-child(5) { animation-delay: 0.25s; }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ===== HELPERS =====
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// Global store for avis data (artisan_id -> { avg, count })
var artisanRatings = {};

function renderArtisanCard(a) {
  var name = a.entreprise || ((a.prenom || '') + ' ' + (a.nom || '')).trim() || 'Artisan';
  var metier = a.metier || 'Artisan';
  var zones = (a.zones || []).join(', ') || 'Non spécifié';
  var specialites = (a.specialites || []);
  var description = a.description || '';
  var urgence = a.urgence || false;
  var telephone = a.telephone || '';

  // Get rating from avis data
  var rating = artisanRatings[a.id] || { avg: 0, count: 0 };
  var score = rating.avg;
  var avisCount = rating.count;

  // Generate star display
  var starsHtml = '';
  var fullStars = Math.floor(score);
  var hasHalf = (score - fullStars) >= 0.5;
  for (var si = 0; si < 5; si++) {
    if (si < fullStars) {
      starsHtml += '\u2605';
    } else if (si === fullStars && hasHalf) {
      starsHtml += '\u2605';
    } else {
      starsHtml += '\u2606';
    }
  }

  var scoreDisplay = avisCount > 0 ? score.toFixed(1) : '\u2014';
  var reviewsDisplay = avisCount > 0 ? '(' + avisCount + ' avis)' : '(nouveau)';

  // Determine availability based on horaires
  var dispo = 'semaine';
  var dispoLabel = 'Cette semaine';

  // Build tags HTML
  var tagsHtml = '';
  specialites.slice(0, 3).forEach(function(s) {
    tagsHtml += '<span class="card-tag">' + escapeHtml(s) + '</span>';
  });

  // Build urgence badge HTML
  var urgenceHtml = '';
  if (urgence && telephone) {
    var tel = telephone.replace(/\s/g, '');
    urgenceHtml = '<a href="tel:+41' + escapeHtml(tel) + '" class="card-urgence-badge" style="text-decoration:none; color:white; cursor:pointer;" onclick="event.stopPropagation()"><span class="urgence-dot"></span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 013.12 4.18 2 2 0 015.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg> Urgence \u2014 Appeler</a>';
  }

  var card = document.createElement('div');
  card.className = 'artisan-card';
  card.setAttribute('data-score', score.toString());
  card.setAttribute('data-avis-count', avisCount.toString());
  card.setAttribute('data-dispo', dispo);
  if (urgence) card.setAttribute('data-urgence', '1');
  card.onclick = function() { window.location.href = 'profil.html?id=' + a.id; };

  var avatarHtml = a.avatar_url
    ? '<img src="' + a.avatar_url + '?t=' + Date.now() + '" alt="' + escapeHtml(name) + '" style="width:100%;height:100%;object-fit:cover">'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>';

  card.innerHTML =
    '<div class="card-img">' +
      avatarHtml +
      '<div class="card-img-badge"><span class="badge-available">Disponible</span></div>' +
    '</div>' +
    '<div class="card-body">' +
      '<h2 class="card-name">' + escapeHtml(name) + '</h2>' +
      '<div class="card-rating">' +
        '<span class="card-stars">' + starsHtml + '</span>' +
        '<span class="card-score">' + scoreDisplay + '</span>' +
        '<span class="card-reviews">' + reviewsDisplay + '</span>' +
      '</div>' +
      '<div class="card-trade">' + escapeHtml(metier) + '</div>' +
      '<div class="card-location">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>' +
        escapeHtml(zones) +
      '</div>' +
      '<div class="card-tags">' + tagsHtml + '</div>' +
      '<div class="card-description">' + escapeHtml(description) + '</div>' +
      urgenceHtml +
    '</div>' +
    '<div class="card-side">' +
      '<div class="card-avail">' +
        '<div class="card-avail-label">Prochaines disponibilit\u00e9s</div>' +
        '<div class="card-avail-value">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>' +
          dispoLabel +
        '</div>' +
      '</div>' +
      '<a href="profil.html?id=' + a.id + '" class="btn-voir-profil" onclick="event.stopPropagation()">Voir le profil</a>' +
      '<a href="demande.html?artisan=' + a.id + '" class="btn-contacter" onclick="event.stopPropagation()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg> Contacter</a>' +
    '</div>';

  return card;
}

// ===== MAIN INIT =====
(async function() {
  var params = new URLSearchParams(window.location.search);
  var metier = params.get('metier') || '';
  var ville = params.get('ville') || '';
  var urgenceParam = params.get('urgence');

  // Capitalize first letter
  if (metier) metier = metier.charAt(0).toUpperCase() + metier.slice(1);
  if (ville) ville = ville.charAt(0).toUpperCase() + ville.slice(1);

  // Fallback display labels
  var metierDisplay = metier || 'Artisan';
  var villeDisplay = ville || 'Suisse romande';

  // Update title
  var h1 = document.querySelector('.search-title');
  if (h1) h1.innerHTML = escapeHtml(metierDisplay) + ' \u00e0 <span>' + escapeHtml(villeDisplay) + '</span>';

  // Update breadcrumb
  var breadcrumbLinks = document.querySelectorAll('.breadcrumb a');
  if (breadcrumbLinks[1]) breadcrumbLinks[1].textContent = metierDisplay;
  var lastBreadcrumb = document.querySelector('.breadcrumb span[style]');
  if (lastBreadcrumb) lastBreadcrumb.textContent = villeDisplay;

  // Update nav search inputs
  var navInputs = document.querySelectorAll('.nav-search-field input');
  if (navInputs[0]) navInputs[0].value = metierDisplay;
  if (navInputs[1]) navInputs[1].value = villeDisplay;

  // Update page title
  document.title = metierDisplay + ' \u00e0 ' + villeDisplay + ' \u2014 R\u00e9sultats | Artisano';

  // ===== FETCH ARTISANS FROM SUPABASE =====
  try {
    // Query all artisans
    var { data: artisans, error: artErr } = await _sb.from('artisans').select('*');
    if (artErr) throw artErr;

    if (!artisans) artisans = [];

    // Filter by metier if param exists (case-insensitive)
    if (metier) {
      artisans = artisans.filter(function(a) {
        return a.metier && a.metier.toLowerCase() === metier.toLowerCase();
      });
    }

    // Filter by ville/zone if param exists (check if any zone matches, case-insensitive)
    if (ville) {
      artisans = artisans.filter(function(a) {
        if (!a.zones || !Array.isArray(a.zones) || a.zones.length === 0) return false;
        var villeLower = ville.toLowerCase();
        return a.zones.some(function(z) {
          return z.toLowerCase().indexOf(villeLower) !== -1 || villeLower.indexOf(z.toLowerCase()) !== -1;
        });
      });
    }

    // ===== FETCH AVIS (ratings) FROM SUPABASE =====
    var { data: avisData, error: avisErr } = await _sb.from('avis').select('artisan_id, note');
    if (!avisErr && avisData) {
      // Group by artisan_id and compute averages
      var grouped = {};
      avisData.forEach(function(av) {
        if (!grouped[av.artisan_id]) grouped[av.artisan_id] = [];
        grouped[av.artisan_id].push(av.note);
      });
      Object.keys(grouped).forEach(function(aid) {
        var notes = grouped[aid];
        var sum = notes.reduce(function(a, b) { return a + b; }, 0);
        artisanRatings[aid] = {
          avg: Math.round((sum / notes.length) * 10) / 10,
          count: notes.length
        };
      });
    }

    // Hide loading state
    var loadingEl = document.getElementById('loading-state');
    if (loadingEl) loadingEl.style.display = 'none';

    // Update count
    var count = document.querySelector('.search-count');
    if (count) count.textContent = artisans.length + ' professionnel' + (artisans.length > 1 ? 's' : '') + ' trouv\u00e9' + (artisans.length > 1 ? 's' : '');

    // Show empty state or render cards
    if (artisans.length === 0) {
      document.getElementById('empty-state').style.display = '';
      // Update sort bar
      var sortBarLeft = document.querySelector('.sort-bar-left');
      if (sortBarLeft) sortBarLeft.innerHTML = '<strong>0</strong> r\u00e9sultat';
    } else {
      var container = document.getElementById('artisans-container');
      artisans.forEach(function(a, idx) {
        var card = renderArtisanCard(a);
        card.style.animationDelay = (0.05 * (idx + 1)) + 's';
        container.appendChild(card);
      });

      // Update sort bar count
      var sortBarLeft = document.querySelector('.sort-bar-left');
      if (sortBarLeft) {
        sortBarLeft.innerHTML = 'Affichage de <strong>1 \u00e0 ' + artisans.length + '</strong> sur <strong>' + artisans.length + '</strong> r\u00e9sultats';
      }
    }

    // Auto-activate urgence filter if URL param present
    if (urgenceParam === '1') {
      var urgBtn = document.getElementById('filter-urgence');
      if (urgBtn) {
        urgBtn.classList.add('active');
        document.getElementById('filter-tous').classList.remove('active');
      }
      applyFilters();
    }

  } catch (err) {
    console.error('Erreur chargement artisans:', err);
    var loadingEl = document.getElementById('loading-state');
    if (loadingEl) loadingEl.innerHTML = '<p style="color:#D32F2F; font-size:15px;">Erreur lors du chargement. Veuillez r\u00e9essayer.</p>';
  }
})();

// ===== FILTER SYSTEM =====
var dispoValues = ['aujourdhui', '48h', 'semaine'];

function toggleFilter(btn, type) {
  btn.classList.toggle('active');
  var tousBtn = document.getElementById('filter-tous');
  var anyActive = document.querySelector('.filter-btn.active:not(#filter-tous)');
  if (anyActive) {
    tousBtn.classList.remove('active');
  } else {
    tousBtn.classList.add('active');
  }
  applyFilters();
}

function toggleUrgenceFilter(btn) {
  toggleFilter(btn, 'urgence');
}

function resetFilters() {
  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.classList.remove('active');
  });
  document.getElementById('filter-tous').classList.add('active');
  applyFilters();
}

function applyFilters() {
  var filterDispo = document.getElementById('filter-dispo').classList.contains('active');
  var filterNote = document.getElementById('filter-note').classList.contains('active');
  var filterUrgence = document.getElementById('filter-urgence').classList.contains('active');

  var cards = document.querySelectorAll('#artisans-container .artisan-card');
  var visibleCount = 0;

  cards.forEach(function(card) {
    var show = true;

    if (filterDispo) {
      var dispo = card.getAttribute('data-dispo');
      if (dispoValues.indexOf(dispo) === -1) show = false;
    }

    if (filterNote) {
      var score = parseFloat(card.getAttribute('data-score') || '0');
      if (score < 4) show = false;
    }

    if (filterUrgence) {
      if (!card.hasAttribute('data-urgence')) show = false;
    }

    if (show) {
      card.style.display = '';
      visibleCount++;
    } else {
      card.style.display = 'none';
    }
  });

  // Show/hide empty state based on filter results
  var emptyState = document.getElementById('empty-state');
  var loadingState = document.getElementById('loading-state');
  var hasAnyFilter = filterDispo || filterNote || filterUrgence;
  if (visibleCount === 0 && cards.length > 0 && hasAnyFilter) {
    if (emptyState) emptyState.style.display = '';
  } else if (cards.length > 0) {
    if (emptyState) emptyState.style.display = 'none';
  }

  // Update result count
  var sortBarLeft = document.querySelector('.sort-bar-left');
  if (sortBarLeft) {
    var totalCards = cards.length;
    if (hasAnyFilter) {
      var labels = [];
      if (filterUrgence) labels.push('urgence');
      if (filterDispo) labels.push('disponibles cette semaine');
      if (filterNote) labels.push('4\u2605+');
      sortBarLeft.innerHTML = '<strong>' + visibleCount + '</strong> artisan' + (visibleCount > 1 ? 's' : '') + ' \u2014 ' + labels.join(', ');
    } else {
      sortBarLeft.innerHTML = 'Affichage de <strong>1 \u00e0 ' + totalCards + '</strong> sur <strong>' + totalCards + '</strong> r\u00e9sultats';
    }
  }
}

// ===== SORT SYSTEM =====
(function() {
  var sortSelect = document.querySelector('.sort-select select');
  if (sortSelect) {
    sortSelect.addEventListener('change', function() {
      var val = this.value;
      var container = document.getElementById('artisans-container');
      var cards = Array.from(container.querySelectorAll('.artisan-card'));

      if (val === 'Meilleure note') {
        cards.sort(function(a, b) {
          return parseFloat(b.getAttribute('data-score') || '0') - parseFloat(a.getAttribute('data-score') || '0');
        });
      } else if (val === "Plus d'avis") {
        cards.sort(function(a, b) {
          return parseInt(b.getAttribute('data-avis-count') || '0') - parseInt(a.getAttribute('data-avis-count') || '0');
        });
      }
      // Re-append in sorted order
      cards.forEach(function(card, idx) {
        card.style.animationDelay = (0.05 * (idx + 1)) + 's';
        container.appendChild(card);
      });
    });
  }
})();

// ===== NAV SEARCH =====
function navSearch() {
  var inputs = document.querySelectorAll('.nav-search-field input');
  var metier = inputs[0] ? inputs[0].value.trim() : '';
  var ville = inputs[1] ? inputs[1].value.trim() : '';
  var params = [];
  if (metier) params.push('metier=' + encodeURIComponent(metier));
  if (ville) params.push('ville=' + encodeURIComponent(ville));
  window.location.href = 'recherche.html' + (params.length ? '?' + params.join('&') : '');
}
document.querySelectorAll('.nav-search-field input').forEach(function(input) {
  input.addEventListener('keydown', function(e) { if (e.key === 'Enter') navSearch(); });
});
</script>
<script src="artisano-common.js"></script>
