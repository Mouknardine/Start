<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nouveau mot de passe | Artisano</title>
<meta name="theme-color" content="#E8700A">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23E8700A'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="artisano-common.css">
<style>
  body { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--gray-50, #f9fafb); }
  .reset-card { background:white; border-radius:var(--radius); border:1px solid var(--gray-200); padding:40px; width:100%; max-width:420px; margin:20px; box-shadow:0 4px 24px rgba(0,0,0,0.06); }
  .reset-logo { text-align:center; margin-bottom:24px; }
  .reset-logo a { font-family:'Sora',sans-serif; font-size:24px; font-weight:800; color:var(--dark); text-decoration:none; }
  .reset-title { font-family:'Sora',sans-serif; font-size:20px; font-weight:800; color:var(--dark); text-align:center; margin-bottom:8px; }
  .reset-sub { font-size:14px; color:var(--gray-500); text-align:center; margin-bottom:28px; line-height:1.5; }
  .form-group { margin-bottom:16px; }
  .form-group label { display:block; font-size:13px; font-weight:600; color:var(--dark); margin-bottom:6px; }
  .form-group input { width:100%; padding:12px 14px; border:1px solid var(--gray-200); border-radius:12px; font-size:14px; font-family:'DM Sans',sans-serif; transition:border-color 0.2s; box-sizing:border-box; }
  .form-group input:focus { outline:none; border-color:var(--orange); box-shadow:0 0 0 3px rgba(232,112,10,0.1); }
  .btn-reset { width:100%; padding:14px; background:var(--orange); color:white; border:none; border-radius:50px; font-family:'Sora',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:all 0.2s; margin-top:8px; }
  .btn-reset:hover { background:var(--orange-dark); transform:translateY(-1px); }
  .btn-reset:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
  .msg-error { display:none; background:var(--red-light); color:var(--red); padding:10px 14px; border-radius:10px; font-size:13px; margin-bottom:16px; }
  .msg-success { display:none; background:var(--green-light); color:var(--green); padding:10px 14px; border-radius:10px; font-size:13px; margin-bottom:16px; text-align:center; line-height:1.5; }
  .back-link { display:block; text-align:center; margin-top:20px; font-size:13px; color:var(--gray-500); text-decoration:none; }
  .back-link:hover { color:var(--orange); }
</style>
</head>
<body>

  <div class="reset-card">
    <div class="reset-logo">
      <a href="index.html">artisano<span class="logo-dot" style="display:inline-block;width:6px;height:6px;background:var(--orange);border-radius:50%;margin-left:1px;vertical-align:super;"></span></a>
    </div>
    <div class="reset-title">Nouveau mot de passe</div>
    <div class="reset-sub">Choisissez un nouveau mot de passe pour votre compte.</div>

    <div class="msg-error" id="resetError"></div>
    <div class="msg-success" id="resetSuccess"></div>

    <div id="resetForm">
      <div class="form-group">
        <label>Nouveau mot de passe</label>
        <input type="password" id="newPassword" placeholder="Minimum 6 caractères" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <input type="password" id="confirmPassword" placeholder="Retapez votre mot de passe" autocomplete="new-password">
      </div>
      <button class="btn-reset" id="btnReset" onclick="handleResetPassword()">Changer mon mot de passe</button>
    </div>

    <a href="connexion.html" class="back-link">← Retour à la connexion</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    // Soumettre avec Enter
    document.getElementById('confirmPassword').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleResetPassword();
    });

    async function handleResetPassword() {
      var errorEl = document.getElementById('resetError');
      var successEl = document.getElementById('resetSuccess');
      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      var pw = document.getElementById('newPassword').value;
      var pw2 = document.getElementById('confirmPassword').value;

      if (!pw || pw.length < 6) {
        errorEl.textContent = 'Le mot de passe doit contenir au moins 6 caractères.';
        errorEl.style.display = 'block';
        return;
      }

      if (pw !== pw2) {
        errorEl.textContent = 'Les mots de passe ne correspondent pas.';
        errorEl.style.display = 'block';
        return;
      }

      var btn = document.getElementById('btnReset');
      btn.disabled = true;
      btn.textContent = 'Modification en cours...';

      try {
        var { error } = await _sb.auth.updateUser({ password: pw });
        if (error) throw error;

        document.getElementById('resetForm').style.display = 'none';
        successEl.innerHTML = 'Mot de passe modifié avec succès !<br>Vous allez être redirigé...';
        successEl.style.display = 'block';

        setTimeout(function() {
          window.location.href = 'connexion.html';
        }, 2500);
      } catch(e) {
        errorEl.textContent = e.message || 'Erreur lors de la modification.';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Changer mon mot de passe';
      }
    }
  </script>
</body>
</html>
