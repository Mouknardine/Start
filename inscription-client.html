<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Créer mon compte | Artisano</title>
<meta name="description" content="Créez votre compte client Artisano pour suivre vos demandes et laisser des avis.">
<meta name="theme-color" content="#E8700A">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23E8700A'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="artisano-common.css">
<style>
  body { min-height:100vh; display:flex; flex-direction:column; }

  nav { padding:20px 40px; display:flex; align-items:center; justify-content:center; }
  .logo { font-family:'Sora',sans-serif; font-weight:800; font-size:28px; color:var(--dark); text-decoration:none; display:flex; align-items:center; gap:6px; }
  .logo-dot { width:10px; height:10px; background:var(--orange); border-radius:50%; }

  .signup-container { flex:1; display:flex; align-items:center; justify-content:center; padding:0 20px 60px; }
  .signup-card { background:white; border-radius:20px; padding:48px 44px; width:100%; max-width:440px; border:1px solid var(--gray-200); box-shadow:0 4px 24px rgba(0,0,0,0.04); }

  .signup-title { font-family:'Sora',sans-serif; font-size:26px; font-weight:800; text-align:center; margin-bottom:8px; }
  .signup-subtitle { text-align:center; font-size:15px; color:var(--gray-500); margin-bottom:32px; line-height:1.5; }

  .form-group { margin-bottom:20px; }
  label { display:block; font-size:14px; font-weight:600; color:var(--dark); margin-bottom:6px; }
  input[type="email"], input[type="password"], input[type="text"] {
    width:100%; padding:14px 16px; border:2px solid var(--gray-200); border-radius:var(--radius-sm);
    font-family:'DM Sans',sans-serif; font-size:15px; color:var(--dark); background:white; transition:all 0.2s; outline:none;
  }
  input:focus { border-color:var(--orange); box-shadow:0 0 0 3px rgba(232,112,10,0.1); }
  input::placeholder { color:var(--gray-500); }

  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

  .btn-signup { background:var(--orange); color:white; padding:16px; border-radius:50px; font-family:'Sora',sans-serif; font-weight:700; font-size:16px; border:none; cursor:pointer; transition:all 0.3s; width:100%; margin-top:8px; }
  .btn-signup:hover { background:var(--orange-dark); transform:translateY(-2px); box-shadow:0 8px 24px rgba(232,112,10,0.3); }
  .btn-signup:disabled { opacity:0.6; cursor:wait; transform:none; box-shadow:none; }

  .signup-footer { text-align:center; margin-top:28px; font-size:14px; color:var(--gray-500); }
  .signup-footer a { color:var(--orange); font-weight:600; text-decoration:none; }
  .signup-footer a:hover { text-decoration:underline; }

  .password-hint { font-size:11px; color:var(--gray-500); margin-top:4px; }

  @media (max-width:600px) {
    nav { padding:12px 16px; }
    .signup-container { padding:0 12px 40px; }
    .signup-card { padding:24px 16px; max-width:100%; border-radius:16px; }
    .signup-title { font-size:22px; }
    .form-row { grid-template-columns:1fr; }
    input[type="email"], input[type="password"], input[type="text"] { font-size:16px; min-height:44px; }
    .btn-signup { min-height:44px; font-size:15px; }
  }
</style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">artisano<span class="logo-dot"></span></a>
  </nav>

  <div class="signup-container">
    <div class="signup-card">
      <h1 class="signup-title">Créer mon compte</h1>
      <p class="signup-subtitle">Suivez vos demandes et laissez des avis</p>

      <div class="form-row">
        <div class="form-group">
          <label>Prénom</label>
          <input type="text" id="client-prenom" placeholder="Jean">
        </div>
        <div class="form-group">
          <label>Nom</label>
          <input type="text" id="client-nom" placeholder="Dupont">
        </div>
      </div>

      <div class="form-group">
        <label>Adresse email</label>
        <input type="email" id="client-email" placeholder="jean.dupont@email.ch">
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="client-password" placeholder="Minimum 6 caractères">
        <div class="password-hint">Au moins 6 caractères</div>
      </div>

      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <input type="password" id="client-password-confirm" placeholder="Retapez votre mot de passe">
      </div>

      <div id="signup-error" style="color:#D32F2F; font-size:14px; margin-bottom:12px; display:none;"></div>
      <div id="signup-success" style="color:#2E7D32; font-size:14px; margin-bottom:12px; display:none;"></div>

      <button class="btn-signup" id="btn-signup" onclick="handleClientSignup()">Créer mon compte</button>

      <div class="signup-footer">
        Déjà un compte ? <a href="connexion.html">Se connecter</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    // Redirect if already logged in
    redirectIfLoggedIn();

    async function handleClientSignup() {
      var errorEl = document.getElementById('signup-error');
      var successEl = document.getElementById('signup-success');
      var btn = document.getElementById('btn-signup');
      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      var prenom = document.getElementById('client-prenom').value.trim();
      var nom = document.getElementById('client-nom').value.trim();
      var email = document.getElementById('client-email').value.trim();
      var password = document.getElementById('client-password').value;
      var passwordConfirm = document.getElementById('client-password-confirm').value;

      // Validation
      if (!prenom || !nom) {
        errorEl.textContent = 'Veuillez entrer votre prénom et nom.';
        errorEl.style.display = 'block';
        return;
      }
      if (!email) {
        errorEl.textContent = 'Veuillez entrer votre adresse email.';
        errorEl.style.display = 'block';
        return;
      }
      if (!password || password.length < 6) {
        errorEl.textContent = 'Le mot de passe doit contenir au moins 6 caractères.';
        errorEl.style.display = 'block';
        return;
      }
      if (password !== passwordConfirm) {
        errorEl.textContent = 'Les mots de passe ne correspondent pas.';
        errorEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Création en cours...';

      try {
        // 1. Créer le compte Supabase
        var authData = await signUpClient(email, password);
        var user = authData.user;

        if (!user) {
          throw new Error('Erreur lors de la création du compte.');
        }

        // 2. Se connecter immédiatement (si pas de confirmation email requise)
        var session = authData.session;
        if (!session) {
          try {
            await signInClient(email, password);
          } catch(e) {
            // La confirmation email est peut-être requise
            successEl.textContent = 'Compte créé ! Vérifiez votre email pour confirmer votre inscription, puis connectez-vous.';
            successEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Créer mon compte';
            return;
          }
        }

        // 3. Stocker le nom du client en localStorage pour usage futur
        localStorage.setItem('artisano-client', JSON.stringify({
          prenom: prenom,
          nom: nom,
          email: email
        }));

        // 4. Rediriger vers l'espace client
        window.location.href = 'client.html';

      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Créer mon compte';
        var msg = err.message || 'Erreur lors de la création du compte.';
        if (msg.includes('already registered') || msg.includes('already been registered')) {
          msg = 'Un compte existe déjà avec cet email. Essayez de vous connecter.';
        }
        errorEl.textContent = msg;
        errorEl.style.display = 'block';
      }
    }

    // Enter key on last field
    document.getElementById('client-password-confirm').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleClientSignup();
    });
  </script>
  <script src="artisano-common.js"></script>
</body>
</html>
